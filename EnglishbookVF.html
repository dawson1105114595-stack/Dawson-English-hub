        function setActiveModeButton(modeId) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                const btnMode = btn.getAttribute('data-mode');
                if (btnMode === modeId) {
                    btn.classList.add('mode-tab-active');
                    btn.classList.remove('mode-tab-inactive');
                } else {
                    btn.classList.add('mode-tab-inactive');
                    btn.classList.remove('mode-tab-active');
                }
            });
        }

        function speakWord(wordText) {
            if (!wordText) return;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            const fullPhrase = wordText.trim();
            const audioUrl = `https://dict.youdao.com/dictvoice?type=1&audio=${encodeURIComponent(fullPhrase)}`;
            const audio = new Audio(audioUrl);
            currentAudio = audio;
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(fullPhrase);
                    utterance.lang = 'en-GB';
                    utterance.rate = 0.8;
                    const voices = window.speechSynthesis.getVoices();
                    const ukVoice = voices.find(v => v.lang.startsWith('en-GB'));
                    if (ukVoice) utterance.voice = ukVoice;
                    window.speechSynthesis.speak(utterance);
                }
            });
            audio.onended = () => { if (currentAudio === audio) currentAudio = null; };
        }

        function autoSpeakIfNeeded() {
            if (currentMode === "en2cn" || currentMode === "repeat") {
                const item = currentWordsList[currentCardIndex];
                if (item?.word) speakWord(item.word);
            }
        }

        function loadCurrentWordList() {
            const book = booksDB[currentBookId];
            if (!book?.units[currentUnitId]) currentWordsList = [];
            else currentWordsList = book.units[currentUnitId].words || [];
            wordCounterSpan.innerText = currentWordsList.length;
            currentCardIndex = Math.min(currentCardIndex, currentWordsList.length - 1);
            if (currentCardIndex < 0) currentCardIndex = 0;
            
            if (currentWordsList.length === 0) {
                cardPromptArea.innerHTML = `<div class="py-10 text-[#86868b]"><i class="fa-regular fa-folder-open text-4xl"></i><p>暂无词汇</p></div>`;

                answerDisplayDiv.innerHTML = '📭 暂无词条';
                cardProgressSpan.innerText = `0 / 0`;
                return;
            }
            // 根据当前模式刷新UI
            if (currentMode === "wordlist") {
                renderWordlist();
            } else {
                renderCardByMode();
                updateProgressText();
                autoSpeakIfNeeded();
            }
        }

            if (!currentWordsList.length) return;
            const w = currentWordsList[currentCardIndex];

                cardPromptArea.innerHTML = `

                pronounceBtnArea.innerHTML = '';

                cardPromptArea.innerHTML = `

                        <div class="text-4xl md:text-5xl font-bold text-[#1d1d1f]">${escapeHtml(w.word)}</div>

                const spBtn = document.getElementById('dynamic-speak');
                if (spBtn) spBtn.onclick = (e) => { e.stopPropagation(); speakWord(w.word); };

        function bindEvents() {

    selectBook.addEventListener('change', () => {

        answerDisplayDiv.innerHTML = '✨ 已切换教材';
    });
    // 监听单元切换
    selectUnit.addEventListener('change', onUnitChange);
    // 按钮事件
    revealBtn.addEventListener('click', revealCurrentAnswer);
    prevBtn.addEventListener('click', prevCard);
    nextBtn.addEventListener('click', nextCard);
    // 模式按钮
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => applyMode(btn.getAttribute('data-mode')));
    });
    // 键盘快捷键
    window.addEventListener('keydown', (e) => {
        if (currentMode === "wordlist") return;
        if (e.key === 'ArrowLeft') { prevCard(); e.preventDefault(); }
        else if (e.key === 'ArrowRight') { nextCard(); e.preventDefault(); }
        else if (e.key === ' ' || e.key === 'Spacebar') { revealCurrentAnswer(); e.preventDefault(); }
        else if (e.key === 'Enter' && (currentMode === 'en2cn' || currentMode === 'repeat')) {
            const item = currentWordsList[currentCardIndex];
            if (item) speakWord(item.word); e.preventDefault();
        }
    });
}

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

        function init() {
            currentBookId = selectBook.value;
            currentUnitId = selectUnit.value;
            bindEvents();
            loadCurrentWordList();
            applyMode("cn2en");
}
        init();
    </script>
