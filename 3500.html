<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dawson's 3500词</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .apple-glass {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background-color: rgba(255, 255, 255, 0.8);
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }
        .apple-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 0.5px solid rgba(0, 0, 0, 0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .apple-card:hover {
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }
        .mode-tab-active {
            background-color: #ffffff;
            color: #0071e3;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .mode-tab-inactive {
            background-color: transparent;
            color: #86868b;
        }
        .answer-reveal, .quiz-option {
            background: #f5f5f7;
            border-radius: 48px;
            transition: all 0.2s;
        }
        .quiz-option {
            padding: 0.75rem 1rem;
            text-align: left;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .quiz-option:hover:not(.disabled-opt) {
            background-color: #e9e9ef;
            transform: scale(0.99);
        }
        .quiz-option.correct-highlight {
            background-color: #d1fae5;
            border-left: 4px solid #10b981;
        }
        .quiz-option.wrong-highlight {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
        }
        button:active {
            transform: scale(0.96);
        }
        .part-of-speech {
            background-color: #e8e8ed;
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: #1d1d1f;
            display: inline-block;
            box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.02);
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #e8e8ed;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c6c6c8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

<header class="apple-glass sticky top-0 z-50 transition-all">
    <div class="max-w-6xl mx-auto px-5 py-4 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-2">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
            </div>
            <h1 class="text-lg font-semibold tracking-tight ml-1">📖 Dawson's 3500高中英语词汇</h1>
        </div>
        <div class="flex items-center gap-3 text-xs text-[#86868b]">
            <i class="fa-solid fa-head-side-goggles"></i>
            <span>东北师范大学附属中学深圳学校|黄文伟 </span>
        </div>
    </div>
</header>

<main class="flex-1 max-w-5xl w-full mx-auto px-5 py-7 flex flex-col gap-7">
    <!-- 筛选栏（Unit + Lesson） -->

            <div class="flex items-center gap-2">

                <span class="text-xs font-semibold text-[#86868b] tracking-wide">教学单元</span>
                <select id="select-unit" class="bg-[#f5f5f7] hover:bg-[#e8e8ed] text-sm font-medium rounded-full px-4 py-2 border-0 focus:ring-2 focus:ring-[#0071e3] cursor-pointer transition-all">
                    <option value="Unit 1">Unit 1</option>
                    <option value="Unit 2">Unit 2</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-book-open text-[#0071e3] text-sm"></i>
                <span class="text-xs font-semibold text-[#86868b] tracking-wide">课程进度</span>
                <select id="select-lesson" class="bg-[#f5f5f7] hover:bg-[#e8e8ed] text-sm font-medium rounded-full px-4 py-2 border-0 focus:ring-2 focus:ring-[#0071e3] cursor-pointer transition-all"></select>
            </div>
        </div>
        <div class="flex items-center gap-3">
    <div class="text-xs bg-[#f5f5f7] px-3 py-1.5 rounded-full font-medium text-[#1d1d1f]">
        <i class="fa-regular fa-rectangle-list mr-1"></i> 当前词库: <span id="word-counter">0</span> 个核心词条
    </div>
    <button id="backHomeBtn" class="text-xs bg-[#f5f5f7] hover:bg-[#e8e8ed] px-4 py-1.5 rounded-full font-medium transition flex items-center gap-1 shadow-sm">
        <i class="fa-solid fa-house"></i> 返回主页
    </button>
</div>
    </div>

    <!-- 五大模式选项卡 -->
    <div class="flex flex-wrap justify-center gap-1 bg-[#e8e8ed]/70 p-1.5 rounded-2xl w-full max-w-3xl mx-auto shadow-inner">
        <button data-mode="cn2en" class="mode-btn flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 mode-tab-active">
            <i class="fa-solid fa-language"></i> ① 汉译英
        </button>
        <button data-mode="en2cn" class="mode-btn flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 mode-tab-inactive">
            <i class="fa-solid fa-microphone-lines"></i> ② 英译汉
        </button>
        <button data-mode="repeat" class="mode-btn flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 mode-tab-inactive">
            <i class="fa-solid fa-head-side-vr"></i> ③ 跟读模仿
        </button>
        <button data-mode="wordlist" class="mode-btn flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 mode-tab-inactive">
            <i class="fa-solid fa-table-list"></i> ④ 单词表
        </button>
        <button data-mode="quiz" class="mode-btn flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 mode-tab-inactive">
            <i class="fa-solid fa-square-check"></i> ⑤ 单词自测
        </button>
    </div>

    <!-- 动态内容区域：卡片听写区（前三个模式） -->
    <div id="card-area" class="flex flex-col items-center gap-7 w-full transition-all duration-300">
        <div class="apple-card w-full max-w-2xl p-8 md:p-10 relative overflow-hidden">
            <div class="absolute top-4 right-5 text-xs font-mono bg-white/60 px-3 py-1 rounded-full text-[#86868b]" id="card-progress">0 / 0</div>
            <div class="flex flex-col items-center text-center gap-7 min-h-[280px] justify-center">
                <div id="card-prompt-area" class="w-full"></div>
                <div id="pronounce-btn-area" class="mt-2"></div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4 w-full max-w-xl">
            <button id="reveal-answer-btn" class="answer-reveal px-6 py-3 w-full sm:w-auto bg-[#f5f5f7] hover:bg-[#e9e9ef] text-[#1d1d1f] font-medium rounded-full transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-regular fa-lightbulb"></i> 揭晓答案 / 参考译文
            </button>
            <div id="answer-display" class="text-base font-medium text-[#0071e3] bg-[#f0f9ff] px-5 py-2 rounded-full min-h-[48px] flex items-center justify-center w-full">
                ✨ 点击「揭晓答案」查看
            </div>
            <div class="flex items-center gap-5 mt-2">
                <button id="prev-card" class="w-12 h-12 rounded-full bg-white border border-black/10 shadow-sm text-[#1d1d1f] hover:bg-[#f5f5f7] transition flex items-center justify-center">
                    <i class="fa-solid fa-chevron-left text-base"></i>
                </button>
                <button id="next-card" class="w-12 h-12 rounded-full bg-white border border-black/10 shadow-sm text-[#1d1d1f] hover:bg-[#f5f5f7] transition flex items-center justify-center">
                    <i class="fa-solid fa-chevron-right text-base"></i>
                </button>
            </div>
            <div class="text-xs text-[#86868b] flex gap-3 mt-1">

            </div>
        </div>
    </div>

    <!-- 单词表区域 (列表模式) -->
    <div id="wordlist-area" class="hidden w-full">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="wordlist-container"></div>
    </div>

    <!-- 单词自测区域 (四选一) -->
    <div id="quiz-area" class="hidden w-full max-w-2xl mx-auto">
        <div class="apple-card p-6 md:p-8 flex flex-col gap-6">
            <!-- 得分与进度条 -->
            <div class="flex justify-between items-center">
                <div class="text-sm font-semibold bg-[#f5f5f7] px-3 py-1.5 rounded-full">
                    <i class="fa-regular fa-star text-amber-500"></i> 得分: <span id="quiz-score">0</span>
                </div>
                <div class="text-xs text-[#86868b]">
                    已答: <span id="quiz-attempted">0</span> / <span id="quiz-total-count">0</span>
                </div>
                <button id="quiz-reset" class="text-xs bg-[#e8e8ed] hover:bg-[#ddd] rounded-full px-3 py-1.5 transition">
                    <i class="fa-solid fa-rotate-right"></i> 重置自测
                </button>
            </div>

            <!-- 题目区域 -->
            <div class="text-center py-4 border-b border-black/5">
                <div class="text-4xl md:text-5xl font-bold text-[#1d1d1f] mb-3" id="quiz-word"></div>
                <div class="part-of-speech inline-block" id="quiz-type"></div>
                <button id="quiz-speak" class="ml-3 w-8 h-8 rounded-full bg-[#f0f0f4] hover:bg-[#e5e5ea] text-[#0071e3] transition" title="朗读单词">
                    <i class="fa-solid fa-volume-high text-sm"></i>
                </button>
            </div>

            <!-- 选项列表 四个 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2" id="quiz-options-container"></div>

            <!-- 反馈信息 & 下一题按钮 -->
            <div id="quiz-feedback" class="text-center text-sm font-medium min-h-[48px] flex items-center justify-center"></div>
            <button id="quiz-next-btn" class="mt-2 px-6 py-2.5 rounded-full bg-[#0071e3] text-white font-medium shadow-sm hover:bg-[#0077ed] transition flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-arrow-right"></i> 下一题
            </button>
        </div>
    </div>
</main>

    // DOM 元素
    const selectUnit = document.getElementById('select-unit');
    const selectLesson = document.getElementById('select-lesson');
    const wordCounterSpan = document.getElementById('word-counter');
    const cardArea = document.getElementById('card-area');
    const wordlistArea = document.getElementById('wordlist-area');
    const quizArea = document.getElementById('quiz-area');
    const cardPromptArea = document.getElementById('card-prompt-area');
    const pronounceBtnArea = document.getElementById('pronounce-btn-area');
    const answerDisplayDiv = document.getElementById('answer-display');
    const revealBtn = document.getElementById('reveal-answer-btn');
    const prevBtn = document.getElementById('prev-card');
    const nextBtn = document.getElementById('next-card');
    const cardProgressSpan = document.getElementById('card-progress');

    // 辅助函数
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function speakWord(wordText) {
    if (!wordText) return;
    
    // 立即停止当前所有发音（允许打断）
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }
    
    const cleanWord = wordText.replace(/\(.*?\)/g, "").trim();
    
    // 尝试在线发音
    const audioUrl = `https://dict.youdao.com/dictvoice?type=1&audio=${encodeURIComponent(cleanWord)}`;
    const audio = new Audio(audioUrl);
    currentAudio = audio;
    
    audio.onended = () => {
        if (currentAudio === audio) currentAudio = null;
    };
    audio.onerror = () => {
        // 在线失败，降级到本地语音（无额外延迟）
        currentAudio = null;
        if (window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            // 不等待 getVoices() 同步，直接使用（浏览器会自动选择合适音色）
            window.speechSynthesis.speak(utterance);
        }
    };
    
    audio.play().catch(() => {
        // 播放失败（如自动播放策略）则降级
        currentAudio = null;
        if (window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }
    });
}

    // 更新 lesson 下拉
    function updateLessonSelect() {
        const lessons = Object.keys(vocabularyData[currentUnit] || {});
        selectLesson.innerHTML = '';
        lessons.forEach(lesson => {
            const opt = document.createElement('option');
            opt.value = lesson;
            opt.innerText = lesson;
            selectLesson.appendChild(opt);
        });
        if (lessons.length && !lessons.includes(currentLesson)) currentLesson = lessons[0];
        if (selectLesson.options.length) selectLesson.value = currentLesson;
        loadWordListBySelection();
    }

    function loadWordListBySelection() {
        currentWordsList = (vocabularyData[currentUnit]?.[currentLesson]) || [];
        wordCounterSpan.innerText = currentWordsList.length;
        if (currentCardIndex >= currentWordsList.length) currentCardIndex = Math.max(0, currentWordsList.length - 1);
        if (currentCardIndex < 0) currentCardIndex = 0;

        // 同步重置 quiz 题库 (深拷贝)
        quizWordsList = JSON.parse(JSON.stringify(currentWordsList));
        quizTotalCount = quizWordsList.length;
        document.getElementById('quiz-total-count').innerText = quizTotalCount;
        
        if (currentMode === "wordlist") renderWordlist();
        else if (currentMode === "quiz") resetAndRenderQuiz();
        else { renderCardByMode(); updateProgressText(); autoSpeakIfNeeded(); }
    }

    function autoSpeakIfNeeded() {
        if ((currentMode === "en2cn" || currentMode === "repeat") && currentWordsList[currentCardIndex]) {
            speakWord(currentWordsList[currentCardIndex].word);
        }
    }

    // 卡片模式渲染 (兼容原有)
    function renderCardByMode() {
        if (!currentWordsList.length) {
            cardPromptArea.innerHTML = `<div class="py-10 text-[#86868b]"><i class="fa-regular fa-folder-open text-4xl"></i><p>暂无词汇，请选择其他单元/课</p></div>`;
            pronounceBtnArea.innerHTML = '';
            answerDisplayDiv.innerHTML = '📭 当前无词条';
            cardProgressSpan.innerText = `0 / 0`;
            return;
        }
        const w = currentWordsList[currentCardIndex];
        if (currentMode === "cn2en") {
            cardPromptArea.innerHTML = `<div class="flex flex-col gap-5 items-center"><div class="text-4xl md:text-5xl font-bold text-[#1d1d1f]">${escapeHtml(w.meaning)}</div>${w.type ? `<div class="part-of-speech">${escapeHtml(w.type)}</div>` : ''}</div>`;
            pronounceBtnArea.innerHTML = `<button id="dynamic-speak" class="mt-3 px-7 py-2.5 rounded-full bg-[#0071e3] text-white text-sm font-medium shadow-sm hover:bg-[#0077ed] transition flex items-center gap-2"><i class="fa-solid fa-volume-high"></i> 朗读单词</button>`;
            const spBtn = document.getElementById('dynamic-speak');
            if (spBtn) spBtn.onclick = (e) => { e.stopPropagation(); speakWord(w.word); };
        } else if (currentMode === "en2cn") {
            cardPromptArea.innerHTML = `<div class="flex flex-col gap-5 items-center"><div class="text-4xl md:text-5xl font-bold text-[#1d1d1f]">${escapeHtml(w.word)}</div><div class="part-of-speech">${escapeHtml(w.type)}</div></div>`;
            pronounceBtnArea.innerHTML = `<button id="dynamic-speak" class="mt-3 px-7 py-2.5 rounded-full bg-[#0071e3] text-white text-sm font-medium shadow-sm hover:bg-[#0077ed] transition flex items-center gap-2"><i class="fa-solid fa-volume-high"></i> 朗读单词</button>`;
            const spBtn = document.getElementById('dynamic-speak');
            if (spBtn) spBtn.onclick = (e) => { e.stopPropagation(); speakWord(w.word); };
        } else if (currentMode === "repeat") {
            cardPromptArea.innerHTML = `<div class="flex flex-col gap-6 items-center"><div class="text-3xl md:text-4xl font-bold text-[#1d1d1f]">${escapeHtml(w.word)}</div><div class="text-3xl md:text-4xl font-medium text-[#1d1d1f]">${escapeHtml(w.meaning)}</div><div class="part-of-speech">${escapeHtml(w.type)}</div></div>`;
            pronounceBtnArea.innerHTML = `<button id="dynamic-repeat" class="mt-3 px-8 py-2.5 rounded-full bg-[#0071e3] text-white font-medium shadow-md flex items-center gap-2"><i class="fa-solid fa-ear-listen"></i> 播放单词 · 跟读</button>`;
            const rpBtn = document.getElementById('dynamic-repeat');
            if (rpBtn) rpBtn.onclick = (e) => { e.stopPropagation(); speakWord(w.word); };
        }
        answerDisplayDiv.innerHTML = '✨ 点击揭晓答案';
        updateProgressText();
    }

    function revealCurrentAnswer() {
        if (!currentWordsList.length) return;
        const w = currentWordsList[currentCardIndex];
        if (currentMode === "cn2en") answerDisplayDiv.innerHTML = `<span class="font-bold">📖 英文：</span> ${escapeHtml(w.word)}  <span class="text-[#86868b] ml-2">(${escapeHtml(w.type)})</span>`;
        else if (currentMode === "en2cn") answerDisplayDiv.innerHTML = `<span class="font-bold">🇨🇳 中文：</span> ${escapeHtml(w.meaning)}`;
        else if (currentMode === "repeat") answerDisplayDiv.innerHTML = `<span class="font-bold">📢 完整参考：</span> ${escapeHtml(w.word)} → ${escapeHtml(w.meaning)} (${escapeHtml(w.type)})`;
    }

    function updateProgressText() {
        if (!currentWordsList.length) cardProgressSpan.innerText = `0 / 0`;
        else cardProgressSpan.innerText = `${currentCardIndex+1} / ${currentWordsList.length}`;
    }
    function nextCard() { if (currentWordsList.length && currentCardIndex+1 < currentWordsList.length) { currentCardIndex++; renderCardByMode(); autoSpeakIfNeeded(); } else answerDisplayDiv.innerHTML = '🎉 已是最后一个单词'; }
    function prevCard() { if (currentWordsList.length && currentCardIndex-1 >= 0) { currentCardIndex--; renderCardByMode(); autoSpeakIfNeeded(); } else answerDisplayDiv.innerHTML = '🔙 已是第一个单词'; }

    function renderWordlist() {
        const container = document.getElementById('wordlist-container');
        if (!container) return;
        if (!currentWordsList.length) { container.innerHTML = `<div class="col-span-full text-center py-12 text-[#86868b]">暂无单词数据</div>`; return; }
        container.innerHTML = '';
        currentWordsList.forEach(w => {
            const div = document.createElement('div');
            div.className = "apple-card p-4 flex justify-between items-center bg-white";
            div.innerHTML = `<div class="flex-1"><div class="flex items-center gap-3 flex-wrap"><span class="text-base font-bold text-[#1d1d1f]">${escapeHtml(w.word)}</span><span class="part-of-speech text-sm">${escapeHtml(w.type)}</span></div><p class="text-sm text-[#515154] mt-1">${escapeHtml(w.meaning)}</p></div><button class="wordlist-speak ml-3 w-9 h-9 rounded-full bg-[#f5f5f7] hover:bg-[#e8e8ed] text-[#0071e3] flex items-center justify-center" data-word="${escapeHtml(w.word)}"><i class="fa-solid fa-volume-high"></i></button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.wordlist-speak').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); speakWord(btn.getAttribute('data-word')); }));
    }

    // ================= 自测模块核心（支持自动发音+正确自动跳转） =================
    function getRandomDistractors(correctMeaning, currentWordId, count=3) {
        const candidates = quizWordsList.filter(item => item.meaning !== correctMeaning && item.word !== currentWordId);
        if (candidates.length === 0) return ["出色的", "美丽的", "快速的"];
        const shuffled = [...candidates];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count).map(item => item.meaning);
    }

    function generateQuizQuestion() {
        if (!quizWordsList.length) return null;
        const randomIndex = Math.floor(Math.random() * quizWordsList.length);
        const wordObj = quizWordsList[randomIndex];
        const correct = wordObj.meaning;
        const distractors = getRandomDistractors(correct, wordObj.word, 3);
        let options = [correct, ...distractors];
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { wordObj, options, correctMeaning: correct };
    }

    function clearAutoTimer() {
        if (autoNextTimer) {
            clearTimeout(autoNextTimer);
            autoNextTimer = null;
        }
    }

    function renderQuiz() {
        clearAutoTimer(); // 每次渲染新题目时清除之前的定时器
        if (!quizWordsList.length) {
            document.getElementById('quiz-word').innerText = "暂无单词";
            document.getElementById('quiz-type').innerText = "";
            document.getElementById('quiz-options-container').innerHTML = '<div class="col-span-2 text-center text-gray-500">当前课程无词汇，请切换单元/课</div>';
            document.getElementById('quiz-feedback').innerHTML = '';
            return;
        }
        if (!quizCurrentQuestion) {
            quizCurrentQuestion = generateQuizQuestion();
        }
        const q = quizCurrentQuestion;
        document.getElementById('quiz-word').innerText = q.wordObj.word;
        document.getElementById('quiz-type').innerText = q.wordObj.type;
        // 自动播放当前单词发音
        speakWord(q.wordObj.word);
        
        const container = document.getElementById('quiz-options-container');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = `quiz-option bg-[#f5f5f7] px-4 py-3 rounded-xl border border-black/5 shadow-sm flex items-center gap-3 ${quizLocked ? 'disabled-opt pointer-events-none' : 'cursor-pointer'}`;
            optDiv.innerHTML = `<span class="font-medium text-base">${escapeHtml(opt)}</span>`;
            if (!quizLocked) {
                optDiv.addEventListener('click', () => handleQuizAnswer(opt));
            }
            container.appendChild(optDiv);
        });
        document.getElementById('quiz-score').innerText = quizScore;
        document.getElementById('quiz-attempted').innerText = quizAttempted;
    }

    function handleQuizAnswer(selectedMeaning) {
        if (quizLocked) return;
        const isCorrect = (selectedMeaning === quizCurrentQuestion.correctMeaning);
        if (isCorrect) {
            quizScore++;
            document.getElementById('quiz-feedback').innerHTML = '<span class="text-green-600"><i class="fa-regular fa-circle-check"></i> ✅ 回答正确！1秒后自动跳转下一题</span>';
            // 正确：启用自动跳转（1秒后）
            clearAutoTimer();
            autoNextTimer = setTimeout(() => {
                nextQuizQuestion();
            }, 1000);
        } else {
            document.getElementById('quiz-feedback').innerHTML = `<span class="text-red-500"><i class="fa-regular fa-circle-xmark"></i> ❌ 错误！正确答案是：${escapeHtml(quizCurrentQuestion.correctMeaning)}</span>`;
            // 错误：不做自动跳转，用户需手动点击下一题
        }
        quizAttempted++;
        quizLocked = true;
        // 高亮正确/错误选项
        const container = document.getElementById('quiz-options-container');
        const optionsDivs = container.children;
        for (let i = 0; i < optionsDivs.length; i++) {
            const optText = optionsDivs[i].innerText;
            if (optText === quizCurrentQuestion.correctMeaning) {
                optionsDivs[i].classList.add('correct-highlight');
            } else if (optText === selectedMeaning && !isCorrect) {
                optionsDivs[i].classList.add('wrong-highlight');
            }
        }
        document.getElementById('quiz-score').innerText = quizScore;
        document.getElementById('quiz-attempted').innerText = quizAttempted;
    }

    function nextQuizQuestion() {
        clearAutoTimer();          // 清除任何待执行的自动跳转
        if (!quizWordsList.length) return;
        quizLocked = false;
        quizCurrentQuestion = generateQuizQuestion();
        renderQuiz();              // 重新渲染，自动播放新单词发音
        document.getElementById('quiz-feedback').innerHTML = '';
    }

    function resetAndRenderQuiz() {
        clearAutoTimer();
        quizScore = 0;
        quizAttempted = 0;
        quizLocked = false;
        quizWordsList = JSON.parse(JSON.stringify(currentWordsList));
        quizTotalCount = quizWordsList.length;
        document.getElementById('quiz-total-count').innerText = quizTotalCount;
        if (quizWordsList.length === 0) {
            document.getElementById('quiz-word').innerText = "无数据";
            document.getElementById('quiz-type').innerText = "";
            document.getElementById('quiz-options-container').innerHTML = '<div class="col-span-2 text-center text-gray-500">暂无词汇，请切换课程</div>';
            document.getElementById('quiz-score').innerText = "0";
            document.getElementById('quiz-attempted').innerText = "0";
            return;
        }
        quizCurrentQuestion = generateQuizQuestion();
        renderQuiz();
        document.getElementById('quiz-feedback').innerHTML = '';
    }

    // 模式切换
    function applyMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            const btnMode = btn.getAttribute('data-mode');
            if (btnMode === mode) {
                btn.classList.add('mode-tab-active');
                btn.classList.remove('mode-tab-inactive');
            } else {
                btn.classList.add('mode-tab-inactive');
                btn.classList.remove('mode-tab-active');
            }
        });
        // 隐藏所有容器
        cardArea.classList.add('hidden');
        wordlistArea.classList.add('hidden');
        quizArea.classList.add('hidden');
        if (mode === "wordlist") {
            wordlistArea.classList.remove('hidden');
            renderWordlist();
        } else if (mode === "quiz") {
            quizArea.classList.remove('hidden');
            resetAndRenderQuiz();
        } else {
            cardArea.classList.remove('hidden');
            renderCardByMode();
            updateProgressText();
            autoSpeakIfNeeded();
        }
    }

    function onUnitChange() {
        currentUnit = selectUnit.value;
        updateLessonSelect();
        if (currentMode === "quiz") resetAndRenderQuiz();
        else if (currentMode !== "wordlist") { renderCardByMode(); updateProgressText(); autoSpeakIfNeeded(); }
        else renderWordlist();
    }
    function onLessonChange() {
        currentLesson = selectLesson.value;
        loadWordListBySelection();
        if (currentMode === "quiz") resetAndRenderQuiz();
        else if (currentMode !== "wordlist") { renderCardByMode(); updateProgressText(); autoSpeakIfNeeded(); }
        else renderWordlist();
    }

    function init() {
        selectUnit.innerHTML = '';
        Object.keys(vocabularyData).forEach(unit => {
            const opt = document.createElement('option');
            opt.value = unit; opt.innerText = unit;
            selectUnit.appendChild(opt);
        });
        selectUnit.value = currentUnit;
        updateLessonSelect();
        selectUnit.addEventListener('change', onUnitChange);
        selectLesson.addEventListener('change', onLessonChange);
        revealBtn.addEventListener('click', revealCurrentAnswer);
        prevBtn.addEventListener('click', prevCard);
        nextBtn.addEventListener('click', nextCard);
        document.querySelectorAll('.mode-btn').forEach(btn => btn.addEventListener('click', () => applyMode(btn.getAttribute('data-mode'))));
        document.getElementById('quiz-next-btn')?.addEventListener('click', () => { if (quizWordsList.length) nextQuizQuestion(); });
        document.getElementById('quiz-reset')?.addEventListener('click', () => resetAndRenderQuiz());
        document.getElementById('quiz-speak')?.addEventListener('click', () => {
            if (quizCurrentQuestion && quizCurrentQuestion.wordObj) speakWord(quizCurrentQuestion.wordObj.word);
        });
        window.addEventListener('keydown', (e) => {
            if (currentMode === "wordlist" || currentMode === "quiz") return;
            if (e.key === 'ArrowLeft') { prevCard(); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { nextCard(); e.preventDefault(); }
            else if (e.key === ' ' || e.key === 'Spacebar') { revealCurrentAnswer(); e.preventDefault(); }
            else if (e.key === 'Enter' && (currentMode === 'en2cn' || currentMode === 'repeat') && currentWordsList[currentCardIndex]) {
                speakWord(currentWordsList[currentCardIndex].word); e.preventDefault();
            }
        });
        applyMode("cn2en");
    }
    init();
</script>
</body>
</html>
